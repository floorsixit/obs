# CI — see CONVENTIONS.md › CI. Single package, so no path-filter; one job + the
# standard gates (mirrors the lefthook pre-commit/pre-push).
name: CI
on:
  push: { branches: [main] }
  pull_request:
permissions:
  contents: read
jobs:
  ci-success:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run ty check
      - run: uv run pytest
