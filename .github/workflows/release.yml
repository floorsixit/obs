# Automated releases — python-semantic-release. On push to main it analyses the
# conventional-commit history since the last tag, bumps project.version, updates
# CHANGELOG.md, commits + tags (vX.Y.Z), and creates the GitHub Release. obs is
# git-installed (no PyPI), so there is no artifact build/upload step.
#
# Config lives in pyproject.toml › [tool.semantic_release]. The version-bump commit
# is pushed via a token minted from the `floorsixit-release` GitHub App (App ID
# 4026257) — NOT GITHUB_TOKEN — so the push can bypass branch-protection rules that
# require PRs + ci-success on main (the App is an Integration bypass actor on the
# ruleset). App-token pushes, like GITHUB_TOKEN, do NOT re-trigger workflows (no loop).
name: Release
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: read    # the App token (not GITHUB_TOKEN) does the privileged push
    steps:
      - name: Mint a token from the floorsixit-release App
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout (full history for version analysis)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}   # push as the App → bypasses the ruleset
          persist-credentials: true

      - name: Pin release branch to the workflow sha
        run: git reset --hard ${{ github.sha }}

      - name: Semantic release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          git_committer_name: "floorsixit-release[bot]"
          git_committer_email: "292719070+floorsixit-release[bot]@users.noreply.github.com"
